<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEX IQ — India's Premier Legal Quiz Platform
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2307090F'/%3E%3Crect x='1.5' y='1.5' width='61' height='61' rx='11' fill='none' stroke='%23C9A44A' stroke-width='2' opacity='.6'/%3E%3Ctext x='32' y='46' font-family='Georgia,serif' font-size='38' font-weight='700' fill='%23C9A44A' text-anchor='middle' font-style='italic'%3EL%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta name="description" content="Master Indian Constitutional Law through adaptive quizzes, live leaderboards, and live rooms.">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

/* =========================================================
   RESET & TOKENS
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

:root {
  --bg:    #07090F;
  --surf:  #0D1119;
  --card:  #111827;
  --card2: #161F2E;
  --gold:  #C9A44A;
  --gold2: #E2C475;
  --gd12:  rgba(201,164,74,.12);
  --gd25:  rgba(201,164,74,.25);
  --gd40:  rgba(201,164,74,.40);
  --tx:    #EDE7D4;
  --tx2:   #9AA3B8;
  --tx3:   #4A5568;
  --bdr:   rgba(201,164,74,.15);
  --bdr2:  rgba(201,164,74,.38);
  --royal: #1B3A6B;
  --red:   #EF4444;
  --green: #22C55E;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'DM Sans', system-ui, sans-serif;
  --disp:  'Bebas Neue', Arial Narrow, sans-serif;
  --rad:   10px;
  --rad2:  18px;
  --ease:  cubic-bezier(.4,0,.2,1);
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--tx);
  overflow-x: hidden;
  line-height: 1.6;
}

a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: var(--sans); border: none; background: none; }
img { max-width: 100%; display: block; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

/* =========================================================
   NAVIGATION
   ========================================================= */
#topnav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  height: 64px;
  display: flex; align-items: center;
  padding: 0 40px;
  background: rgba(7,9,15,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bdr);
  transition: box-shadow .3s var(--ease), border-color .3s var(--ease);
}
#topnav.scrolled { box-shadow: 0 4px 30px rgba(0,0,0,.7); border-color: var(--bdr2); }

.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--gold);
}
.nav-emblem {
  width: 34px; height: 34px; border-radius: 7px;
  background: var(--gd12); border: 1.5px solid var(--bdr2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--disp); font-size: .95rem; color: var(--gold);
}
.nav-links {
  list-style: none; display: flex; align-items: center; gap: 2px;
  margin-left: auto;
}
.nav-links a {
  color: var(--tx2); font-size: .83rem; font-weight: 500;
  padding: 6px 14px; border-radius: 30px;
  transition: color .2s, background .2s;
}
.nav-links a:hover { color: var(--tx); background: rgba(255,255,255,.06); }
.nav-live-btn {
  display: flex !important; align-items: center; gap: 6px;
  color: var(--red) !important;
  border: 1px solid rgba(239,68,68,.28) !important;
  background: rgba(239,68,68,.07) !important;
  font-size: .76rem !important; font-weight: 600 !important;
  padding: 5px 13px !important; border-radius: 20px !important;
}
.nav-live-btn:hover { background: rgba(239,68,68,.14) !important; }

.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

#nav-right { margin-left: 18px; display: flex; align-items: center; gap: 10px; }
.btn-nav-signin {
  background: var(--gd12); border: 1px solid var(--bdr2);
  color: var(--gold); font-weight: 600; font-size: .8rem;
  padding: 8px 20px; border-radius: 30px;
  transition: background .2s;
}
.btn-nav-signin:hover { background: var(--gd25); }
#user-nav { display: none; align-items: center; gap: 10px; }
#nav-username { color: var(--tx2); font-size: .83rem; cursor: pointer; transition: color .2s; }
#nav-username:hover { color: var(--gold); }
#nav-avatar { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--bdr2); cursor: pointer; object-fit: cover; transition: border-color .2s, transform .2s; }
#nav-avatar:hover { border-color: var(--gold); transform: scale(1.07); }

@media (max-width: 768px) {
  .nav-links { display: none; }
  #topnav { padding: 0 20px; }
}

/* =========================================================
   HERO
   ========================================================= */
#hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  padding: 110px 40px 90px;
  background: var(--bg);
}

/* Background grid */
.hero-grid {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(201,164,74,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,164,74,.03) 1px, transparent 1px);
  background-size: 70px 70px;
  mask-image: radial-gradient(ellipse 85% 70% at 50% 50%, black, transparent);
  -webkit-mask-image: radial-gradient(ellipse 85% 70% at 50% 50%, black, transparent);
}

/* Ambient glow */
.hero-glow {
  position: absolute; pointer-events: none;
  width: 800px; height: 800px; border-radius: 50%;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(201,164,74,.07) 0%, rgba(27,58,107,.04) 45%, transparent 70%);
}

/* Spinning rings */
.hero-ring {
  position: absolute; border-radius: 50%; pointer-events: none;
  border: 1px solid rgba(201,164,74,.07);
  top: 50%; left: 50%;
  animation: spinRing linear infinite;
}
.ring1 { width: 560px; height: 560px; margin: -280px 0 0 -280px; animation-duration: 50s; }
.ring2 { width: 820px; height: 820px; margin: -410px 0 0 -410px; animation-duration: 80s; animation-direction: reverse; border-color: rgba(201,164,74,.04); }
@keyframes spinRing { to { transform: rotate(360deg); } }

/* Particles container */
#particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.dot {
  position: absolute; border-radius: 50%; background: var(--gold); opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(100vh) scale(0); }
  10%  { opacity: .4; }
  90%  { opacity: .08; }
  100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
}

/* Hero content */
.hero-content { position: relative; z-index: 2; text-align: center; max-width: 860px; width: 100%; }

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 12px;
  font-size: .68rem; font-weight: 600; letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 28px;
  animation: fadeUp .7s .0s both;
}
.hero-eyebrow::before, .hero-eyebrow::after { content:''; height: 1px; width: 24px; background: var(--bdr2); }

.hero-title {
  font-family: var(--serif);
  font-size: clamp(5rem, 12vw, 8.5rem);
  font-weight: 700; line-height: .92; letter-spacing: -3px;
  color: var(--tx); margin-bottom: 16px;
  animation: fadeUp .7s .1s both;
}
.hero-title em { color: var(--gold); font-style: italic; }

.hero-rule { width: 50px; height: 1px; background: var(--bdr2); margin: 0 auto 20px; animation: fadeUp .7s .18s both; }

.hero-tagline {
  font-family: var(--disp); font-size: clamp(.85rem, 1.8vw, 1rem);
  letter-spacing: 7px; text-transform: uppercase; color: var(--tx2);
  margin-bottom: 26px; animation: fadeUp .7s .24s both;
}

.hero-desc {
  font-size: .98rem; color: var(--tx2); max-width: 540px;
  margin: 0 auto 46px; font-weight: 300; line-height: 1.88;
  animation: fadeUp .7s .32s both;
}

.hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; animation: fadeUp .7s .4s both; }

@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }

/* CTA buttons */
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--gold) 0%, #9A7530 100%);
  color: #07090F; font-weight: 700; font-size: .87rem;
  padding: 13px 32px; border-radius: 4px; border: none;
  letter-spacing: .8px; text-transform: uppercase;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(201,164,74,.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,164,74,.45); }

.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--tx2); font-weight: 500; font-size: .87rem;
  padding: 12px 24px; border-radius: 4px;
  border: 1px solid var(--bdr);
  transition: border-color .2s, color .2s, background .2s;
}
.btn-secondary:hover { border-color: var(--bdr2); color: var(--gold); background: var(--gd12); }

.btn-live {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--red); font-weight: 500; font-size: .87rem;
  padding: 12px 20px; border-radius: 4px;
  border: 1px solid rgba(239,68,68,.22);
  background: rgba(239,68,68,.06);
  transition: background .2s, border-color .2s;
}
.btn-live:hover { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.4); }

/* Stats bar */
.hero-statsbar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
  display: flex; justify-content: center;
  background: rgba(13,17,25,.94);
  backdrop-filter: blur(14px);
  border-top: 1px solid var(--bdr);
  animation: fadeUp .7s .55s both;
}
.stat-item {
  flex: 1; max-width: 190px; text-align: center;
  padding: 18px 20px; border-right: 1px solid var(--bdr);
}
.stat-item:last-child { border-right: none; }
.stat-num { font-family: var(--disp); font-size: 1.8rem; color: var(--gold); letter-spacing: 1px; }
.stat-lbl { font-size: .64rem; color: var(--tx2); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

/* =========================================================
   SHARED SECTION STYLES
   ========================================================= */
.section { padding: 90px 40px; }
.section-inner { max-width: 1200px; margin: 0 auto; }

.section-header { margin-bottom: 56px; }
.section-header.center { text-align: center; }
.section-header.center .section-sub { margin: 0 auto; }

.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: .65rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 14px;
}
.eyebrow::before { content:''; width: 16px; height: 1px; background: var(--gold); opacity: .5; }

.section-title {
  font-family: var(--serif);
  font-size: clamp(2rem, 4.5vw, 2.9rem);
  font-weight: 700; line-height: 1.08; letter-spacing: -1px;
  color: var(--tx); margin-bottom: 14px;
}
.section-sub { font-size: .93rem; color: var(--tx2); max-width: 500px; line-height: 1.82; }

/* =========================================================
   HOW IT WORKS
   ========================================================= */
#how-it-works { background: var(--surf); border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr); }

.steps-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1px; background: var(--bdr);
  border: 1px solid var(--bdr); border-radius: var(--rad); overflow: hidden;
}
.step-card {
  background: var(--surf); padding: 36px 28px;
  position: relative; transition: background .25s;
}
.step-card:hover { background: var(--card); }
.step-topline {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
  opacity: 0; transition: opacity .25s;
}
.step-card:hover .step-topline { opacity: 1; }
.step-number { font-family: var(--disp); font-size: 3rem; color: rgba(201,164,74,.1); line-height: 1; margin-bottom: 16px; }
.step-icon { font-size: 1.5rem; margin-bottom: 12px; display: block; }
.step-name { font-family: var(--serif); font-size: 1.18rem; font-weight: 600; color: var(--tx); margin-bottom: 8px; }
.step-desc { font-size: .84rem; color: var(--tx2); line-height: 1.75; }

/* =========================================================
   QUIZ SECTIONS
   ========================================================= */
#quiz-sections { background: var(--bg); }

.quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

.quiz-card {
  background: var(--card); border: 1px solid var(--bdr); border-radius: var(--rad);
  overflow: hidden; cursor: pointer;
  transition: border-color .25s, box-shadow .25s, transform .25s;
}
.quiz-card:hover { border-color: var(--bdr2); box-shadow: 0 10px 40px rgba(0,0,0,.55); transform: translateY(-4px); }
.quiz-card.coming-soon { opacity: .55; cursor: default; pointer-events: none; }

.card-banner {
  height: 120px; position: relative; overflow: hidden;
  background: linear-gradient(135deg, var(--royal), #0c1b3a);
  display: flex; align-items: center; justify-content: center;
}
.card-banner-glow {
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 90%, rgba(201,164,74,.1), transparent 65%);
}
.card-emoji { font-size: 2.9rem; position: relative; z-index: 1; filter: drop-shadow(0 4px 12px rgba(0,0,0,.5)); transition: transform .25s; }
.quiz-card:hover .card-emoji { transform: scale(1.15) rotate(-5deg); }

.tag-live {
  position: absolute; top: 10px; left: 10px; z-index: 2;
  display: flex; align-items: center; gap: 5px;
  background: var(--gd12); border: 1px solid var(--bdr2); color: var(--gold);
  font-size: .58rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 3px;
}
.tag-soon {
  position: absolute; top: 10px; right: 10px; z-index: 2;
  background: rgba(7,9,15,.8); border: 1px solid rgba(255,255,255,.08); color: var(--tx2);
  font-size: .58rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 3px;
}

.card-body { padding: 20px 18px; }
.card-category { font-size: .62rem; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.card-title { font-family: var(--serif); font-size: 1.2rem; font-weight: 600; color: var(--tx); line-height: 1.25; margin-bottom: 8px; }
.card-desc { font-size: .81rem; color: var(--tx2); line-height: 1.7; margin-bottom: 14px; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.ctag { font-size: .64rem; color: var(--tx2); background: var(--surf); border: 1px solid var(--bdr); padding: 2px 8px; border-radius: 3px; }

.btn-card {
  width: 100%; padding: 11px; border-radius: var(--rad);
  font-size: .8rem; font-weight: 600; letter-spacing: .4px;
  background: var(--gd12); border: 1px solid var(--bdr2); color: var(--gold);
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: background .2s, color .2s;
}
.btn-card:hover { background: var(--gd25); color: var(--gold2); }
.btn-card:disabled { opacity: .45; cursor: default; }

/* =========================================================
   CONSTITUTIONAL PARTS
   ========================================================= */
#constitution { background: var(--surf); border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr); }

.parts-topbar {
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 16px; margin-bottom: 40px;
}
.search-wrap { position: relative; }
.search-wrap input {
  background: var(--card); border: 1px solid var(--bdr); color: var(--tx);
  font-family: var(--sans); font-size: .86rem;
  padding: 10px 36px 10px 14px; border-radius: var(--rad);
  outline: none; width: 240px;
  transition: border-color .2s;
}
.search-wrap input::placeholder { color: var(--tx3); }
.search-wrap input:focus { border-color: var(--bdr2); }
.search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--tx3); pointer-events: none; }

.parts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }

.part-card {
  background: var(--card); border: 1px solid var(--bdr); border-radius: var(--rad);
  padding: 20px 18px 16px; cursor: pointer;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color .25s, transform .25s, box-shadow .25s;
}
.part-card::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--gold); opacity: 0; transition: opacity .25s;
}
.part-card:hover { border-color: var(--bdr2); transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,.4); }
.part-card:hover::after { opacity: 1; }

.part-bg-num {
  position: absolute; top: 4px; right: 10px;
  font-family: var(--disp); font-size: 2.1rem; color: rgba(201,164,74,.07);
  letter-spacing: 1px; line-height: 1; pointer-events: none;
}
.part-badge {
  display: inline-flex; align-items: center;
  background: var(--gd12); border: 1px solid rgba(201,164,74,.2); color: var(--gold);
  font-size: .58rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px; margin-bottom: 10px; width: fit-content;
}
.part-name {
  font-family: var(--serif); font-size: .97rem; font-weight: 600; color: var(--tx);
  line-height: 1.3; margin-bottom: 5px; flex: 1;
}
.part-arts { font-size: .71rem; color: var(--tx2); margin-bottom: 10px; }
.part-topics { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 13px; }
.topic-tag { font-size: .62rem; color: var(--tx2); background: var(--surf); border: 1px solid var(--bdr); padding: 2px 6px; border-radius: 3px; }

.btn-part {
  width: 100%; text-align: center; padding: 8px;
  border: 1px solid var(--bdr); border-radius: 6px;
  font-size: .75rem; font-weight: 600; color: var(--tx2);
  background: transparent; transition: all .2s;
}
.part-card:hover .btn-part { border-color: var(--bdr2); color: var(--gold); background: var(--gd12); }

/* =========================================================
   FEATURES
   ========================================================= */
#features { background: var(--bg); }

.features-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 1px; background: var(--bdr);
  border: 1px solid var(--bdr); border-radius: var(--rad); overflow: hidden;
}
.feature-block { background: var(--bg); padding: 32px 26px; transition: background .25s; }
.feature-block:hover { background: var(--card); }
.feat-icon { font-size: 1.5rem; margin-bottom: 14px; display: block; }
.feat-name { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; color: var(--tx); margin-bottom: 8px; }
.feat-desc { font-size: .83rem; color: var(--tx2); line-height: 1.75; }

/* =========================================================
   LEADERBOARD
   ========================================================= */
#leaderboard { background: var(--surf); border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr); }

/* Leaderboard selector */
.lb-selector-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
.lb-selector-label { font-size: .72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--tx2); white-space: nowrap; }
.lb-select-wrap { position: relative; flex: 1; max-width: 440px; min-width: 240px; }
.lb-select-wrap select {
  width: 100%; appearance: none; -webkit-appearance: none;
  background: var(--card); border: 1px solid var(--bdr2); color: var(--gold);
  font-family: var(--sans); font-size: .88rem; font-weight: 600;
  padding: 11px 40px 11px 16px; border-radius: var(--rad);
  cursor: pointer; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.lb-select-wrap select:hover, .lb-select-wrap select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,164,74,.12); }
.lb-select-wrap select option { background: var(--card2); color: var(--tx); }
.lb-select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--gold); pointer-events: none; font-size: .9rem; }
.lb-selected-label { font-family: var(--serif); font-size: 1rem; font-weight: 600; color: var(--tx2); font-style: italic; }

/* Difficulty filter tabs */
.lb-diff-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.lb-diff-label { font-size: .68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--tx3); }
.lb-diff-btn {

  {id:'XIX',  title:'Miscellaneous',                         articles:'361–367',    topics:['Presidential Immunity','Interpretation'],                        maxQ:15},
  {id:'XX',   title:'Amendment of the Constitution',         articles:'368',        topics:['Constitutional Amendment','Basic Structure Doctrine'],           maxQ:10},
  {id:'XXI',  title:'Temporary and Transitional Provisions', articles:'369–392',    topics:['Transitional Provisions','Special Status'],                      maxQ:20},
  {id:'XXII', title:'Short Title, Commencement and Repeals', articles:'393–395',    topics:['Commencement','Repeal of Acts'],                                 maxQ:10},
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentUser   = null;
let activePart    = null;
let activeDiff    = 'medium';
let activeQCount  = 10;
let activeLbPart  = 'III';
let activeLbDiff  = 'medium';
let toastTimeout  = null;

// Exact question counts per part per difficulty (from Supabase import)
const Q_COUNTS = {
  'I':   {easy:12,medium:12,hard:11}, 'II':  {easy:11,medium:11,hard:10},
  'III': {easy:34,medium:34,hard:33}, 'IV':  {easy:27,medium:27,hard:26},
  'IVA': {easy:10,medium:10,hard:10}, 'V':   {easy:36,medium:35,hard:35},
  'VI':  {easy:30,medium:30,hard:30}, 'VIII':{easy:17,medium:17,hard:16},
  'IX':  {easy:17,medium:17,hard:16}, 'IXA': {easy:16,medium:15,hard:15},
  'IXB': {easy:11,medium:10,hard:10}, 'X':   {easy:7, medium:6, hard:6},
  'XI':  {easy:14,medium:13,hard:13}, 'XII': {easy:17,medium:17,hard:16},
  'XIII':{easy:6, medium:6, hard:5},  'XIV': {easy:10,medium:10,hard:9},
  'XIVA':{easy:4, medium:4, hard:4},  'XV':  {easy:6, medium:6, hard:6},
  'XVI': {easy:9, medium:8, hard:8},  'XVII':{easy:7, medium:7, hard:6},
  'XVIII':{easy:9,medium:8, hard:8},  'XIX': {easy:6, medium:6, hard:6},
  'XX':  {easy:7, medium:7, hard:7},  'XXI': {easy:18,medium:18,hard:18},
  'XXII':{easy:6, medium:6, hard:6},
};

// ─────────────────────────────────────────────
// GOOGLE SIGN-IN
// Strategy: load GSI via script tag, render real button.
// Multiple fallbacks ensure it always works.
// ─────────────────────────────────────────────
function loadGSI() {
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.async = true;
  script.defer = true;
  script.onload = function() { initGSI(); };
  script.onerror = function() { showFallbackBtn(); };
  document.head.appendChild(script);
}

function initGSI() {
  if (!window.google || !window.google.accounts || !window.google.accounts.id) {
    showFallbackBtn();
    return;
  }
  try {
    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: onGoogleToken,
      auto_select: false,
      cancel_on_tap_outside: true,
      ux_mode: 'popup'
    });
    renderGSIButton();
  } catch(e) {
    showFallbackBtn();
  }
}

function renderGSIButton() {
  const container = document.getElementById('gsi-container');
  if (!container) return;
  try {
    google.accounts.id.renderButton(container, {
      type: 'standard',
      theme: 'outline',
      size: 'large',
      text: 'signin_with',
      shape: 'rectangular',
      logo_alignment: 'center',
      width: 400
    });
    // Hide fallback since real button rendered
    document.getElementById('gsi-fallback').style.display = 'none';
  } catch(e) {
    showFallbackBtn();
  }
}

function showFallbackBtn() {
  const fb = document.getElementById('gsi-fallback');
  if (fb) fb.style.display = 'block';
}

function triggerGoogleSignin() {
  if (!window.google || !window.google.accounts) {
    showToast('Google Sign-In not available. Please refresh.', 'red');
    return;
  }
  google.accounts.id.prompt(notification => {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      // One Tap blocked — try re-rendering and clicking
      const btn = document.querySelector('#gsi-container div[role="button"]');
      if (btn) { btn.click(); return; }
      // Last resort: show a message
      showToast('Please allow pop-ups for Google Sign-In.', 'red');
    }
  });
}

function onGoogleToken(response) {
  try {
    const payload = decodeJWT(response.credential);
    currentUser = {
      id: payload.sub,
      name: payload.name,
      email: payload.email,
      picture: payload.picture,
      token: response.credential,
      privLb: true,
      privHist: false,
      privAna: true
    };
    localStorage.setItem('lexiq_user', JSON.stringify(currentUser));
    closeModal('modal-signin');
    applySignedInState();
    showToast('Welcome, ' + currentUser.name.split(' ')[0] + '! ⚖', 'gold');
    supaRegisterUser(currentUser);
    const pending = sessionStorage.getItem('pendingPart');
    if (pending) { sessionStorage.removeItem('pendingPart'); setTimeout(() => openQuizConfig(pending), 500); }
  } catch(e) {
    showToast('Sign-in failed. Please try again.', 'red');
  }
}

function decodeJWT(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
}

function restoreSession() {
  const saved = localStorage.getItem('lexiq_user');
  if (!saved) return;
  try {
    currentUser = JSON.parse(saved);
    applySignedInState();
    supaRegisterUser(currentUser);
    const pending = sessionStorage.getItem('pendingPart');
    if (pending) { sessionStorage.removeItem('pendingPart'); setTimeout(() => openQuizConfig(pending), 500); }
  } catch(e) {
    localStorage.removeItem('lexiq_user');
  }
}

function applySignedInState() {
  document.getElementById('signin-area').style.display = 'none';
  document.getElementById('user-nav').style.display = 'flex';
  document.getElementById('nav-username').textContent = currentUser.name.split(' ')[0];
  document.getElementById('nav-avatar').src = currentUser.picture;
  document.getElementById('profile-pic').src = currentUser.picture;
  document.getElementById('profile-name').textContent = currentUser.name;
  document.getElementById('profile-email').textContent = currentUser.email;
  document.getElementById('tog-lb').checked   = currentUser.privLb !== false;
  document.getElementById('tog-hist').checked = currentUser.privHist === true;
  document.getElementById('tog-ana').checked  = currentUser.privAna !== false;
  fetchUserStats();
  loadLeaderboard(activeLbPart);
}

function doSignOut() {
  if (window.google && window.google.accounts) google.accounts.id.disableAutoSelect();
  currentUser = null;
  localStorage.removeItem('lexiq_user');
  closeModal('modal-profile');
  document.getElementById('signin-area').style.display = 'flex';
  document.getElementById('user-nav').style.display = 'none';
  showToast('Signed out successfully.');
}

function doDeleteAccount() {
  if (!confirm('⚠ Permanently delete your LEX IQ account?\n\nThis removes ALL your scores and history. This cannot be undone.')) return;
  showToast('Deleting account…');
  supaDeleteAccount(currentUser.id).then(() => { doSignOut(); showToast('Account deleted.', 'red'); });
}

async function fetchUserStats() {
  if (!currentUser) return;
  const { data } = await db.from('scores').select('score').eq('user_id', currentUser.id);
  if (!data || !data.length) return;
  const avg = Math.round(data.reduce((a,b) => a + b.score, 0) / data.length);
  document.getElementById('pstat-quizzes').textContent = data.length;
  document.getElementById('pstat-avg').textContent     = avg + '%';
  document.getElementById('pstat-rank').textContent    = '#—';
}

function savePrivacy(key, val) {
  if (!currentUser) return;
  if (key === 'leaderboard') currentUser.privLb = val;
  if (key === 'history')     currentUser.privHist = val;
  if (key === 'analytics')   currentUser.privAna = val;
  localStorage.setItem('lexiq_user', JSON.stringify(currentUser));
  const col = key==='leaderboard'?'priv_lb':key==='history'?'priv_hist':'priv_ana'; db.from('users').update({[col]:val}).eq('id',currentUser.id);
  showToast('Privacy settings saved.', 'gold');
}

// ─────────────────────────────────────────────
// PARTS GRID
// ─────────────────────────────────────────────
function renderParts(list) {
  const grid = document.getElementById('parts-grid');
  if (!grid) return;
  if (!list.length) {
    grid.innerHTML = '<p style="color:var(--tx2);padding:20px 0;">No parts match your search.</p>';
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="part-card" onclick="openQuizConfig('${p.id}')">
      <div class="part-bg-num">${p.id}</div>
      <div class="part-badge">Part ${p.id}</div>
      <h3 class="part-name">${esc(p.title)}</h3>
      <p class="part-arts">Articles ${p.articles} &middot; up to ${p.maxQ} Qs</p>
      <div class="part-topics">
        ${p.topics.slice(0,3).map(t => `<span class="topic-tag">${esc(t)}</span>`).join('')}
        ${p.topics.length > 3 ? `<span class="topic-tag">+${p.topics.length - 3}</span>` : ''}
      </div>
      <div class="btn-part">Start Quiz ›</div>
    </div>
  `).join('');
}

function filterParts(query) {
  const q = query.toLowerCase().trim();
  if (!q) { renderParts(PARTS); return; }
  renderParts(PARTS.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.id.toLowerCase().includes(q) ||
    p.topics.some(t => t.toLowerCase().includes(q))
  ));
}

// ─────────────────────────────────────────────
// QUIZ CONFIG
// ─────────────────────────────────────────────
function openQuizConfig(partId) {
  if (!currentUser) {
    showToast('Please sign in to start a quiz.');
    sessionStorage.setItem('pendingPart', partId);
    openSignin();
    return;
  }
  const part = PARTS.find(p => p.id === partId);
  if (!part) return;
  activePart = part;
  activeDiff = 'medium';
  document.getElementById('config-title').textContent = 'Part ' + part.id + ' Quiz';
  document.getElementById('config-sub').textContent   = part.title;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.diff-btn.medium').classList.add('selected');
  updateSlider('medium');
  openModal('modal-config');
}

function updateSlider(diff) {
  if (!activePart) return;
  const avail = (Q_COUNTS[activePart.id] || {})[diff] || activePart.maxQ;
  const slider  = document.getElementById('cfg-qslider');
  const display = document.getElementById('cfg-qcount-display');
  const availEl = document.getElementById('cfg-avail');
  const minEl   = document.getElementById('cfg-slider-min');
  const maxEl   = document.getElementById('cfg-slider-max');
  const badge   = document.getElementById('btn-qcount-badge');

  // Build smart step options based on available count
  const steps = buildSteps(avail);
  const defaultVal = steps[Math.floor(steps.length * 0.6)] || steps[steps.length-1];

  slider.min   = steps[0];
  slider.max   = avail;
  slider.step  = 1;
  slider.value = Math.min(activeQCount, avail);

  // Update percent for gradient
  const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
  slider.style.setProperty('--pct', pct + '%');

  activeQCount   = parseInt(slider.value);
  if (availEl)  availEl.textContent  = avail;
  if (display)  display.textContent  = activeQCount;
  if (minEl)    minEl.textContent    = steps[0];
  if (maxEl)    maxEl.textContent    = avail + ' (All)';
  if (badge)    badge.textContent    = activeQCount + ' Qs';
}

function buildSteps(max) {
  if (max <= 10)  return [5, max];
  if (max <= 20)  return [5, 10, max];
  if (max <= 35)  return [5, 10, 15, max];
  return [5, 10, 15, 20, Math.round(max/2), max];
}

function onSliderChange(slider) {
  const val = parseInt(slider.value);
  activeQCount = val;
  const avail = parseInt(slider.max);
  const pct = ((val - parseInt(slider.min)) / (avail - parseInt(slider.min))) * 100;
  slider.style.setProperty('--pct', Math.min(100,Math.max(0,pct)) + '%');
  const display = document.getElementById('cfg-qcount-display');
  const badge   = document.getElementById('btn-qcount-badge');
  if (display) display.textContent = val;
  if (badge)   badge.textContent   = val + ' Qs';
}

function pickDiff(diff, btn) {
  activeDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updateSlider(diff);
}

function startQuiz() {
  if (!activePart) return;
  closeModal('modal-config');
  const cfg = JSON.stringify({
    partId:    activePart.id,
    partTitle: activePart.title,
    difficulty: activeDiff,
    count:     activeQCount,
    userId:    currentUser.id,
    userName:  currentUser.name,
    userPic:   currentUser.picture
  });
  try { sessionStorage.setItem('lexiq_quiz_config', cfg); } catch(e) {}
  try { localStorage.setItem('lexiq_quiz_config', cfg); }   catch(e) {}
  window.location.href = 'quiz.html?cfg=' + encodeURIComponent(cfg);
}

// ─────────────────────────────────────────────
// LEADERBOARD
// ─────────────────────────────────────────────
function buildLeaderboardTabs() {
  // Set default difficulty button active
  const defBtn = document.querySelector('.lb-diff-btn.d-medium');
  if (defBtn) defBtn.classList.add('d-medium');
  loadLeaderboard('III');
}

function setLbDiff(diff, btn) {
  activeLbDiff = diff;
  // Remove all active classes
  document.querySelectorAll('.lb-diff-btn').forEach(b => {
    b.classList.remove('d-easy','d-medium','d-hard');
  });
  // Add active class to clicked
  btn.classList.add('d-' + diff);
  loadLeaderboard(activeLbPart);
}

function loadLeaderboard(partId) {
  activeLbPart = partId;
  // Sync dropdown
  const sel = document.getElementById('lb-part-select');
  if (sel) sel.value = partId;
  // Update label
  const lbl = document.getElementById('lb-selected-label');
  if (lbl && sel) lbl.textContent = sel.options[sel.selectedIndex]?.text || '';
  // Show loading
  document.getElementById('lb-body').innerHTML = '<div class="lb-loading"></div>';

  // Difficulty badge colours in header
  const diffColours = {easy:'#4ade80', medium:'#C9A44A', hard:'#f87171'};
  const diffEmoji   = {easy:'🟢', medium:'🟡', hard:'🔴'};

  // Fetch from Supabase — filtered by part AND difficulty
  db.from('scores')
    .select('user_name, user_pic, score, time_taken, difficulty')
    .eq('part_id', partId)
    .eq('difficulty', activeLbDiff)
    .order('score', { ascending: false })
    .order('time_taken', { ascending: true })
    .limit(10)
    .then(({ data, error }) => {
      if (error || !data || !data.length) {
        document.getElementById('lb-body').innerHTML =
          '<div class="lb-empty">' + (diffEmoji[activeLbDiff]||'🏆') +
          ' No ' + activeLbDiff + ' scores yet for this Part — be the first!</div>';
        return;
      }
      const medals    = ['🥇','🥈','🥉'];
      const rankClass = ['rank-gold','rank-silver','rank-bronze'];
      document.getElementById('lb-body').innerHTML = data.map((row, i) => {
        const avatar = row.user_pic
          ? '<img src="' + row.user_pic + '" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">'
          : esc((row.user_name || '?').charAt(0).toUpperCase());
        return '<div class="lb-row">' +
          '<div class="lb-rank ' + (rankClass[i] || '') + '">' + (medals[i] || (i+1)) + '</div>' +
          '<div class="lb-user"><div class="lb-avatar">' + avatar + '</div>' +
          '<div class="lb-name">' + esc(row.user_name || 'Anonymous') + '</div></div>' +
          '<div class="lb-time">' + formatTime(row.time_taken) + '</div>' +
          '<div class="lb-score">' + row.score + '%</div>' +
          '</div>';
      }).join('');
    }).catch(() => {
      document.getElementById('lb-body').innerHTML = '<div class="lb-empty">Unable to load leaderboard right now.</div>';
    });
}

// ─────────────────────────────────────────────
// SUPABASE HELPERS
// ─────────────────────────────────────────────
async function supaRegisterUser(u) {
  if (!u) return;
  await db.from('users').upsert(
    { id: u.id, name: u.name, email: u.email, picture: u.picture },
    { onConflict: 'id' }
  );
}

async function supaDeleteAccount(userId) {
  await db.from('scores').delete().eq('user_id', userId);
  await db.from('users').delete().eq('id', userId);
}

// ─────────────────────────────────────────────
// MODALS
// ─────────────────────────────────────────────
function openModal(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.add('show'); document.body.style.overflow = 'hidden'; }
}
function closeModal(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.remove('show'); document.body.style.overflow = ''; }
}
function openSignin() {
  openModal('modal-signin');
  // Re-render GSI button now that modal is visible
  if (window.google && window.google.accounts && window.google.accounts.id) {
    const c = document.getElementById('gsi-container');
    if (c && !c.querySelector('iframe') && !c.querySelector('[role="button"]')) {
      renderGSIButton();
    }
  }
}
function openProfile() {
  if (!currentUser) { openSignin(); return; }
  fetchUserStats();
  openModal('modal-profile');
}

// Close on backdrop click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('show');
      document.body.style.overflow = '';
    }
  });
});

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function showToast(message, type = '') {
  const el = document.getElementById('toast');
  el.textContent = message;
  el.className = 'toast visible' + (type ? ' ' + type : '');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.classList.remove('visible'), 3500);
}

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function esc(str) {
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function formatTime(s) {
  if (!s) return '—';
  const m = Math.floor(s / 60), r = s % 60;
  return m > 0 ? m + 'm ' + r + 's' : r + 's';
}

function countUp(elementId, target) {
  const el = document.getElementById(elementId);
  if (!el) return;
  let current = 0;
  const step = Math.ceil(target / 60);
  const timer = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current.toLocaleString();
    if (current >= target) clearInterval(timer);
  }, 30);
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth' });
}

// ─────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────
function spawnParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  for (let i = 0; i < 20; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    const size = 1.5 + Math.random() * 2.5;
    dot.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      animation-duration: ${9 + Math.random() * 14}s;
      animation-delay: ${Math.random() * 12}s;
    `;
    container.appendChild(dot);
  }
}

// ─────────────────────────────────────────────
// NAV SCROLL EFFECT
// ─────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const nav = document.getElementById('topnav');
  if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
}, { passive: true });

// ─────────────────────────────────────────────
// INIT — runs on DOMContentLoaded (not load)
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  // 1. Render parts immediately — no dependency on anything
  renderParts(PARTS);

  // 2. Particles
  spawnParticles();

  // 3. Counter animation
  countUp('stat-users', 1247);

  // 4. Build leaderboard tabs
  buildLeaderboardTabs();

  // 5. Restore session
  restoreSession();

  // 6. Load Google Sign-In (separate, non-blocking)
  loadGSI();

   // Prevent Supabase free tier from pausing
db.from('keepalive').insert({}).then(() => {});
});
